<!DOCTYPE html>
<html>
<head>
    <title>Layout CSS 3 Kolom 2 Baris</title>

    <style>

        *{
            box-sizing: border-box;
        }

        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            text-align:center;
        }

        /* Header */
        .header{
            background-color:#4CAF50;
            color:white;
            padding:30px;
            font-size:30px;
        }

        /* Container */
        .row{
            display:flex;
        }

        /* Kolom */
        .column{
            flex:33.33%;
            padding:40px;
            height:250px;
            border:2px solid white;
            font-size:24px;
            color:white;
        }

        /* Warna tiap box */
        .col1{
            background-color:#2196F3;
        }

        .col2{
            background-color:#FF9800;
        }

        .col3{
            background-color:#9C27B0;
        }

        .col4{
            background-color:#f44336;
        }

        .col5{
            background-color:#009688;
        }

        .col6{
            background-color:#795548;
        }

        /* Footer */
        .footer{
            background-color:#333;
            color:white;
            padding:20px;
            font-size:20px;
        }

    </style>
</head>

<body>

    <div class="header">
        HEADER
    </div>

    <!-- Baris Pertama -->
    <div class="row">

        <div class="column col1">
            MENU
        </div>

        <div class="column col2">
            CONTENT
        </div>

        <div class="column col3">
            SIDEBAR
        </div>

    </div>

    <!-- Baris Kedua -->
    <div class="row">

        <div class="column col4">
            GALLERY
        </div>

        <div class="column col5">
            ARTICLE
        </div>

        <div class="column col6">
            CONTACT
        </div>

    </div>

    <div class="footer">
        FOOTER
    </div>

</body>
</html>
